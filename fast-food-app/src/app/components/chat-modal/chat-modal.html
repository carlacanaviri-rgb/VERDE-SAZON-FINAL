<div *ngIf="isOpen" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: flex-end; z-index: 1000;">
  <!-- Modal backdrop cierra al hacer clic -->
  <div (click)="cerrar()" style="position: absolute; inset: 0;"></div>

  <!-- Modal panel -->
  <div style="background: white; width: 100%; max-width: 400px; height: 600px; border-radius: 12px 12px 0 0; display: flex; flex-direction: column; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); position: relative; z-index: 10;">

    <!-- Header -->
    <div style="padding: 16px 20px; border-bottom: 1px solid #e5e5e5; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <h3 style="margin: 0; font-size: 15px; font-weight: 700; color: #111;">{{ 'CHAT.TITULO' | translate }}</h3>
        <p *ngIf="pedido" style="margin: 4px 0 0; font-size: 12px; color: #888;">Pedido #{{ pedido.numero }} - {{ pedido.clienteNombre }}</p>
      </div>
      <button (click)="cerrar()" style="background: none; border: none; cursor: pointer; padding: 4px; color: #888; display: flex; align-items: center; justify-content: center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Mensajes -->
    <div #mensajesScroll style="flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px;">
      <div *ngIf="mensajes.length === 0" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #aaa; font-size: 13px;">
        {{ 'CHAT.SIN_MENSAJES' | translate }}
      </div>

      <div *ngFor="let msg of mensajes" [ngClass]="getClaseMensaje(msg)" style="display: flex; margin-bottom: 4px;">
        <div [style.margin-left]="esDelUsuarioActual(msg) ? 'auto' : '0'" style="max-width: 70%; margin-bottom: 4px;">
          <!-- Avatar + Nombre para mensajes de otros -->
          <div *ngIf="!esDelUsuarioActual(msg)" style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
            <div style="width: 24px; height: 24px; background: #1D9E75; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 600;">
              {{ obtenerInicialAutor(msg) }}
            </div>
            <span style="font-size: 11px; font-weight: 500; color: #666;">{{ msg.autorNombre }}</span>
          </div>

          <!-- Mensaje -->
          <div
            [style.background]="esDelUsuarioActual(msg) ? '#1D9E75' : '#f0f0f0'"
            [style.color]="esDelUsuarioActual(msg) ? 'white' : '#111'"
            style="padding: 10px 12px; border-radius: 8px; word-wrap: break-word; font-size: 13px; line-height: 1.4;">
            {{ msg.contenido }}
          </div>

          <!-- Timestamp -->
          <span style="font-size: 10px; color: #aaa; margin-top: 4px; display: block; text-align: right;">
            {{ msg.timestamp | date: 'short' }}
          </span>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div style="padding: 16px; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; align-items: flex-end;">
      <textarea
        [(ngModel)]="nuevoMensaje"
        (keypress)="onKeyPress($event)"
        [disabled]="enviando"
        placeholder="{{ 'CHAT.PLACEHOLDER' | translate }}"
        style="flex: 1; padding: 10px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 13px; font-family: inherit; resize: none; min-height: 40px; max-height: 80px; outline: none; transition: border-color 0.2s;"
        (focus)="onInputFocus($event)"
        (blur)="onInputBlur($event)">
      </textarea>
      <button
        (click)="enviarMensaje()"
        [disabled]="enviando || !nuevoMensaje.trim()"
        style="background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 13px; transition: background 0.2s; opacity: 1;"
        [style.opacity]="enviando || !nuevoMensaje.trim() ? '0.6' : '1'"
        [style.cursor]="enviando || !nuevoMensaje.trim() ? 'not-allowed' : 'pointer'">
        <svg *ngIf="!enviando" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16398446 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.99021575 L3.03521743,10.4312088 C3.03521743,10.5883061 3.19218622,10.7454035 3.50612381,10.7454035 L16.6915026,11.5308904 C16.6915026,11.5308904 17.1624089,11.5308904 17.1624089,11.0596 L17.1624089,12.0021839 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/></svg>
        <svg *ngIf="enviando" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
    </div>
  </div>
</div>

<style>
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
