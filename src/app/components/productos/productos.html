<div style="display:flex;min-height:100vh;font-family:'Segoe UI',sans-serif;background:#f8faf8">
  
     

    <!-- ✅ logout() coincide con el método del TS -->
    <div (click)="logout()" style="padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:13px;color:#e74c3c;cursor:pointer;border-radius:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar sesión
    </div>
  </div>

  <!-- Main content -->
  <div style="margin-left:220px;flex:1;padding:32px">

    <h1 style="margin:0 0 4px;font-size:24px;font-weight:600;color:#111">Dashboard</h1>
    <p style="margin:0 0 24px;font-size:14px;color:#888">Panel de administración de Verde Sazón</p>

   

      <!-- ✅ productos.length existe en el TS -->
      <div style="background:white;border-radius:10px;border:1px solid #e5e5e5;padding:16px">
        <p style="margin:0 0 8px;font-size:12px;color:#888">Productos</p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:22px;font-weight:600;color:#111">{{ productos.length }}</span>
          <div style="width:36px;height:36px;background:#faeeda;border-radius:50%;display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h12"/></svg>
          </div>
        </div>
      </div>

      <!-- ✅ Reemplazado productosDisponibles (no existía) por el cálculo inline -->
      <div style="background:white;border-radius:10px;border:1px solid #e5e5e5;padding:16px">
        <p style="margin:0 0 8px;font-size:12px;color:#888">Disponibles</p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:22px;font-weight:600;color:#111">
            {{ productosDisponibles }}
          </span>
          <div style="width:36px;height:36px;background:#faece7;border-radius:50%;display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D85A30" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>
    </div>
