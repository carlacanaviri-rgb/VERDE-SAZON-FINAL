<div style="min-height:100vh;background:#f8faf8;font-family:'Segoe UI',sans-serif">

  <!-- Navbar -->
  <header style="background:white;border-bottom:1px solid #e5e5e5;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:#1D9E75;border-radius:50%;display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4"/></svg>
      </div>
      <span style="font-weight:700;font-size:18px;color:#111">Verde Sazón</span>
    </div>
    <nav style="display:flex;gap:32px">
      <a href="#inicio" style="font-size:14px;color:#555;text-decoration:none">Inicio</a>
      <a href="#categorias" style="font-size:14px;color:#555;text-decoration:none">Categorías</a>
      <a href="#menu" style="font-size:14px;color:#555;text-decoration:none">Menú</a>
    </nav>
    <div style="display:flex;align-items:center;gap:16px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" style="cursor:pointer"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" style="cursor:pointer"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <div (click)="irLogin()" style="width:32px;height:32px;background:#f0f7f0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
  </header>


    <!-- Categorías -->
    <section id="categorias" style="margin-bottom:40px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="margin:0;font-size:20px;font-weight:700;color:#111">Categorías</h2>
        <a href="#menu" style="font-size:14px;color:#1D9E75;text-decoration:none">Ver todas →</a>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px">
        <div *ngFor="let cat of categorias.slice(1)"
          (click)="categoriaActiva = cat"
          [style]="categoriaActiva === cat ?
            'background:#1D9E75;border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;border:1px solid #1D9E75' :
            'background:white;border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;border:1px solid #e5e5e5'">
          <div style="font-size:28px;margin-bottom:8px">🍽️</div>
          <p [style]="categoriaActiva === cat ? 'margin:0;font-size:13px;font-weight:500;color:white' : 'margin:0;font-size:13px;font-weight:500;color:#111'">
            {{ cat }}
          </p>
        </div>
      </div>
    </section>
